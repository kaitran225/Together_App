<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llama.cpp — Together AI</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #4a9eff;
      --user-bg: #1f2a3a;
      --bot-bg: #1a1a1a;
      --fast: #3dd68c;
      --ok: #e8c547;
      --slow: #f5a623;
      --very-slow: #f07178;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-links {
      position: absolute;
      top: 0.5rem;
      right: 0.75rem;
      z-index: 5;
      font-size: 0.7rem;
    }
    .top-links a { color: var(--muted); margin-left: 0.75rem; text-decoration: none; }
    .top-links a:hover { color: var(--accent); }
    .layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: min(42rem, 92%);
      padding: 0.6rem 0.85rem;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: var(--user-bg); }
    .msg.assistant { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--border); }
    .msg.error { align-self: stretch; border: 1px solid var(--very-slow); color: #ffc9c9; }
    .msg .meta { font-size: 0.65rem; color: var(--muted); margin-top: 0.35rem; }
    .msg.streaming .meta { display: block !important; color: var(--accent); }
    .msg.streaming div:first-child::after { content: "▋"; animation: blink 1s step-end infinite; color: var(--accent); }
    @keyframes blink { 50% { opacity: 0; } }
    .bottom-bar {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 0.35rem 0.75rem 0.6rem;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.25rem;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      align-items: center;
    }
    .stats strong { color: var(--text); font-weight: 500; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge.fast { background: #1a3d2e; color: var(--fast); }
    .badge.ok { background: #3d361a; color: var(--ok); }
    .badge.slow { background: #3d2a1a; color: var(--slow); }
    .badge.very_slow { background: #3d2226; color: var(--very-slow); }
    .health-dots { display: flex; gap: 0.5rem; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.on { background: var(--fast); }
    .dot.off { background: var(--very-slow); }
    .input-row {
      display: flex;
      gap: 0.45rem;
      align-items: flex-end;
    }
    select, input, textarea, button {
      font: inherit;
      font-size: 0.8rem;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    select, input { padding: 0.4rem 0.5rem; }
    textarea {
      flex: 1;
      resize: none;
      min-height: 2.2rem;
      max-height: 8rem;
      padding: 0.45rem 0.55rem;
      line-height: 1.4;
    }
    button {
      cursor: pointer;
      padding: 0.45rem 0.85rem;
      background: #2a2a2a;
      border-color: #444;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .model-pill {
      max-width: 11rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.72rem;
      padding: 0.4rem 0.55rem;
      cursor: pointer;
      background: #1e1e1e;
    }
    .metrics-panel {
      width: 18rem;
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: width 0.15s, margin 0.15s;
    }
    .metrics-panel.collapsed {
      width: 0;
      border: none;
      overflow: hidden;
    }
    .metrics-panel header {
      padding: 0.5rem 0.65rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }
    .metrics-panel header button {
      padding: 0.2rem 0.45rem;
      font-size: 0.65rem;
    }
    .metrics-table-wrap {
      flex: 1;
      overflow: auto;
      font-size: 0.62rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 0.3rem 0.4rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); position: sticky; top: 0; background: var(--surface); }
    .metrics-summary {
      padding: 0.45rem 0.65rem;
      font-size: 0.65rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .settings {
      display: none;
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .settings.open { display: flex; }
    .settings label { display: flex; flex-direction: column; gap: 0.2rem; color: var(--muted); flex: 1; min-width: 10rem; }
    .settings input { width: 100%; }
    .toggle-metrics {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 4;
      writing-mode: vertical-rl;
      padding: 0.5rem 0.25rem;
      font-size: 0.65rem;
      border-radius: 4px 0 0 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      cursor: pointer;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .metrics-panel { position: fixed; right: 0; top: 0; bottom: 0; z-index: 10; box-shadow: -4px 0 12px #0008; }
      .metrics-panel.collapsed { width: 0; }
    }
  </style>
</head>
<body>
  <div class="top-links">
    <a href="/health" target="_blank">health</a>
    <a href="/docs" target="_blank">api</a>
  </div>

  <div class="layout">
    <div class="chat-wrap">
      <div id="chat" aria-live="polite"></div>

      <footer class="bottom-bar">
        <div class="stats">
          <span class="health-dots" id="healthDots" title="LLM backends"></span>
          <span>Context: <strong id="ctxUsed">0</strong> / <strong id="ctxMax">2048</strong></span>
          <span>Output: <strong id="outTok">0</strong> tok</span>
          <span>Speed: <strong id="speed">—</strong> t/s</span>
          <span>Latency: <strong id="latency">—</strong></span>
          <span class="badge" id="ratingBadge">—</span>
        </div>

        <div class="settings" id="settings">
          <label>
            X-Internal-Api-Key
            <input type="password" id="apiKey" autocomplete="off" />
          </label>
          <label>
            Mode
            <select id="mode">
              <option value="direct" selected>Direct (structured → llama)</option>
              <option value="gateway">Workflow tutor</option>
            </select>
          </label>
          <button type="button" id="benchBtn">Benchmark LLMs</button>
          <button type="button" id="clearMetricsBtn">Clear metrics</button>
        </div>

        <div class="input-row">
          <button type="button" class="model-pill" id="modelBtn" title="Switch model">…</button>
          <select id="llm" style="display:none" aria-hidden="true">
            <option value="smol">smol</option>
            <option value="qwen">qwen</option>
          </select>
          <textarea id="input" rows="1" placeholder="Send a message"></textarea>
          <button type="button" id="settingsBtn" title="Settings">⚙</button>
          <button type="button" class="primary" id="sendBtn">Send</button>
        </div>
      </footer>
    </div>

    <aside class="metrics-panel" id="metricsPanel">
      <header>
        <span>API metrics</span>
        <button type="button" id="collapseMetrics">×</button>
      </header>
      <div class="metrics-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Mode</th>
              <th>LLM</th>
              <th>ms</th>
              <th>out</th>
              <th>t/s</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="metricsBody"></tbody>
        </table>
      </div>
      <div class="metrics-summary" id="metricsSummary">No requests yet.</div>
    </aside>
  </div>

  <button type="button" class="toggle-metrics" id="openMetrics">metrics</button>

  <script>
    const STORAGE_KEY = "together_ai_test_api_key";
    const METRICS_KEY = "together_ai_metrics_v1";

    const apiKeyEl = document.getElementById("apiKey");
    const llmEl = document.getElementById("llm");
    const modelBtn = document.getElementById("modelBtn");
    const modeEl = document.getElementById("mode");
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const settingsEl = document.getElementById("settings");
    const metricsBody = document.getElementById("metricsBody");
    const metricsSummary = document.getElementById("metricsSummary");
    const metricsPanel = document.getElementById("metricsPanel");

    let history = [];
    /** @type {{label:string, id:string}[]} */
    let modelLabels = { smol: "smol", qwen: "qwen" };
    let ctxMax = 2048;
    let lastOutTok = 0;
    let lastSpeed = null;
    let healthHintShown = false;
    /** @type {object[]} */
    let metricsLog = JSON.parse(sessionStorage.getItem(METRICS_KEY) || "[]");

    function syncMetricsToggle() {
      document.getElementById("openMetrics").style.display =
        metricsPanel.classList.contains("collapsed") ? "block" : "none";
    }

    function estTokens(text) {
      return Math.max(1, Math.ceil((text || "").length / 4));
    }

    function contextUsed() {
      return history.reduce((n, t) => n + estTokens(t.content), 0);
    }

    function updateStatusBar(metrics) {
      document.getElementById("ctxUsed").textContent = String(contextUsed());
      document.getElementById("ctxMax").textContent = String(ctxMax);
      const out = metrics?.completion_tokens ?? lastOutTok;
      document.getElementById("outTok").textContent = String(out);
      const tps = metrics?.tokens_per_second ?? lastSpeed;
      document.getElementById("speed").textContent = tps != null ? String(tps) : "—";
      const ms = metrics?.latency_ms;
      document.getElementById("latency").textContent = ms != null ? ms + " ms" : "—";
      const badge = document.getElementById("ratingBadge");
      const rating = metrics?.rating || "—";
      badge.textContent = rating;
      badge.className = "badge " + (rating === "—" ? "" : rating);
    }

    function saveMetrics() {
      sessionStorage.setItem(METRICS_KEY, JSON.stringify(metricsLog.slice(-50)));
      renderMetricsTable();
    }

    function recordMetric(row) {
      metricsLog.push(row);
      saveMetrics();
    }

    function renderMetricsTable() {
      metricsBody.innerHTML = "";
      const rows = metricsLog.slice().reverse().slice(0, 30);
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + r.time + "</td>" +
          "<td>" + r.mode + "</td>" +
          "<td>" + r.llm + "</td>" +
          "<td>" + r.ms + "</td>" +
          "<td>" + (r.outTok ?? "—") + "</td>" +
          "<td>" + (r.tps ?? "—") + "</td>" +
          '<td><span class="badge ' + r.rating + '">' + r.rating + "</span></td>";
        metricsBody.appendChild(tr);
      }
      if (!metricsLog.length) {
        metricsSummary.textContent = "No requests yet.";
        return;
      }
      const avg = metricsLog.reduce((s, r) => s + r.ms, 0) / metricsLog.length;
      const fast = metricsLog.filter((r) => r.rating === "fast").length;
      const slow = metricsLog.filter((r) => ["slow", "very_slow"].includes(r.rating)).length;
      metricsSummary.textContent =
        metricsLog.length + " calls · avg " + Math.round(avg) + " ms · " +
        fast + " fast · " + slow + " slow";
    }

    function addMessage(role, content, meta) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      const body = document.createElement("div");
      body.textContent = content;
      div.appendChild(body);
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = meta;
        div.appendChild(m);
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function syncModelBtn() {
      const id = llmEl.value;
      modelBtn.textContent = modelLabels[id] || id;
    }

    modelBtn.addEventListener("click", () => {
      llmEl.value = llmEl.value === "smol" ? "qwen" : "smol";
      syncModelBtn();
    });
    llmEl.addEventListener("change", syncModelBtn);

    async function loadUiConfig() {
      try {
        const r = await fetch("/api/v1/ai/ui-config");
        const d = await r.json();
        ctxMax = d.contextSize || 2048;
        document.getElementById("ctxMax").textContent = String(ctxMax);
        if (d.models) {
          modelLabels = {
            smol: d.models.smol?.label || "smol",
            qwen: d.models.qwen?.label || "qwen",
          };
        }
        const stored = localStorage.getItem(STORAGE_KEY);
        apiKeyEl.value = stored || d.defaultApiKey || "";
        if (d.defaultLlm) llmEl.value = d.defaultLlm;
        if (d.defaultMode) modeEl.value = d.defaultMode;
        syncModelBtn();
      } catch (e) {
        apiKeyEl.value = localStorage.getItem(STORAGE_KEY) || "dev-internal-ai-key";
        syncModelBtn();
      }
    }

    async function refreshHealth() {
      const dots = document.getElementById("healthDots");
      try {
        const t0 = performance.now();
        const r = await fetch("/health");
        const healthMs = Math.round(performance.now() - t0);
        const d = await r.json();
        dots.innerHTML =
          '<span class="dot ' + (d.llm_smol ? "on" : "off") + '" title="smol"></span>' +
          '<span class="dot ' + (d.llm_qwen ? "on" : "off") + '" title="qwen"></span>' +
          '<span style="margin-left:0.25rem">health ' + healthMs + "ms</span>";
        if (d.hint && !healthHintShown) {
          healthHintShown = true;
          addMessage("error", d.hint);
        }
      } catch (e) {
        dots.innerHTML = '<span style="color:var(--very-slow)">health err</span>';
      }
    }

    function createStreamingBubble() {
      const div = document.createElement("div");
      div.className = "msg assistant streaming";
      const body = document.createElement("div");
      div.appendChild(body);
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = "streaming…";
      div.appendChild(meta);
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return { div, body, meta };
    }

    function formatApiDetail(detail) {
      if (detail == null) return "unknown error";
      if (typeof detail === "string") return detail;
      if (Array.isArray(detail)) {
        return detail
          .map((d) => {
            const loc = (d.loc || []).join(".");
            return (loc ? loc + ": " : "") + (d.msg || JSON.stringify(d));
          })
          .join("; ");
      }
      if (typeof detail === "object") return JSON.stringify(detail);
      return String(detail);
    }

    function sanitizeHistory(h) {
      return (h || []).filter(
        (t) =>
          t &&
          t.content &&
          String(t.content).trim() &&
          ["system", "user", "assistant"].includes(String(t.role || "").toLowerCase())
      ).map((t) => ({ role: String(t.role).toLowerCase(), content: String(t.content).trim() }));
    }

    /** POST + read SSE (event: token | done | error). */
    async function postSSE(url, payload, headers) {
      const t0 = performance.now();
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...headers },
        body: JSON.stringify(payload),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error("HTTP " + r.status + ": " + formatApiDetail(err.detail || err));
      }
      const { div, body, meta } = createStreamingBubble();
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let full = "";
      let doneData = null;
      let firstTokenAt = null;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const blocks = buffer.split("\n\n");
        buffer = blocks.pop() || "";
        for (const block of blocks) {
          if (!block.trim()) continue;
          let event = "message";
          let dataLine = "";
          for (const line of block.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) dataLine = line.slice(5).trim();
          }
          if (!dataLine) continue;
          let data;
          try {
            data = JSON.parse(dataLine);
          } catch {
            continue;
          }
          if (event === "token" && data.t) {
            if (firstTokenAt === null) firstTokenAt = performance.now();
            full += data.t;
            body.textContent = full;
            chatEl.scrollTop = chatEl.scrollHeight;
          } else if (event === "done") {
            doneData = data;
            full = data.reply || full;
            body.textContent = full;
            if (data.structure && data.structure.promptTokens != null) {
              document.getElementById("ctxUsed").textContent = String(data.structure.promptTokens);
            }
          } else if (event === "error") {
            throw new Error(data.detail || "Stream error");
          }
        }
      }
      div.classList.remove("streaming");
      const latencyMs = Math.round(performance.now() - t0);
      const ttft = firstTokenAt != null ? Math.round(firstTokenAt - t0) : null;
      return {
        reply: full,
        metrics: doneData?.metrics,
        structure: doneData?.structure,
        llm: doneData?.llm,
        latencyMs,
        ttft,
      };
    }

    function finishStreamTurn(text, result, modeLabel) {
      const reply = (result.reply && result.reply.trim()) || null;
      if (!reply) {
        addMessage("error", "Empty reply from " + modeLabel + ".");
        return false;
      }
      history.push({ role: "user", content: text });
      history.push({ role: "assistant", content: reply });
      const m = result.metrics || {};
      lastOutTok = m.completion_tokens ?? estTokens(reply);
      lastSpeed = m.tokens_per_second ?? (
        lastOutTok && m.latency_ms ? +(lastOutTok / (m.latency_ms / 1000)).toFixed(2) : null
      );
      const st = result.structure || {};
      const meta =
        (result.ttft != null ? "TTFT " + result.ttft + " ms · " : "") +
        (m.latency_ms != null ? m.latency_ms + " ms" : result.latencyMs + " ms") +
        (st.promptTokens != null ? " · prompt " + st.promptTokens + " tok" : "") +
        (st.truncated ? " · trimmed" : "") +
        (lastSpeed != null ? " · ~" + lastSpeed + " t/s" : "") +
        " · " + (m.rating || "—") +
        " · " + modeLabel;
      const bubbles = chatEl.querySelectorAll(".msg.assistant");
      const last = bubbles[bubbles.length - 1];
      if (last) {
        const metaEl = last.querySelector(".meta");
        if (metaEl) metaEl.textContent = meta;
      }
      updateStatusBar({ ...m, completion_tokens: lastOutTok, tokens_per_second: lastSpeed });
      recordMetric({
        time: new Date().toLocaleTimeString(),
        mode: modeLabel,
        llm: result.llm || llmEl.value,
        ms: Math.round(m.latency_ms ?? result.latencyMs),
        outTok: lastOutTok,
        tps: lastSpeed,
        rating: m.rating || "ok",
      });
      return true;
    }

    async function send() {
      const text = inputEl.value.trim();
      const key = apiKeyEl.value.trim();
      if (!text) return;
      if (!key) {
        addMessage("error", "Set API key in settings (⚙).");
        return;
      }
      localStorage.setItem(STORAGE_KEY, key);
      addMessage("user", text);
      inputEl.value = "";
      sendBtn.disabled = true;
      const mode = modeEl.value;
      const llm = llmEl.value;
      const headers = { "X-Internal-Api-Key": key };
      const prior = sanitizeHistory(history);

      try {
        if (mode === "direct") {
          const messages = prior.concat([{ role: "user", content: text }]);
          const result = await postSSE(
            "/api/v1/ai/proxy/chat/stream",
            { messages, llm, structure: true },
            headers
          );
          finishStreamTurn(text, result, "direct");
        } else if (mode === "gateway") {
          const result = await postSSE(
            "/api/v1/internal/ai/message/stream",
            {
              message: text,
              query: text,
              llm,
              ...(prior.length ? { context: { chatHistory: prior } } : {}),
            },
            headers
          );
          finishStreamTurn(text, result, "gateway");
        }
        updateStatusBar();
      } catch (e) {
        addMessage("error", e.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function benchmark() {
      const key = apiKeyEl.value.trim();
      if (!key) return;
      sendBtn.disabled = true;
      addMessage("assistant", "Running benchmark (health + 1-token direct chat per LLM)…");
      await refreshHealth();
      for (const llm of ["smol", "qwen"]) {
        const t0 = performance.now();
        try {
          const r = await fetch("/api/v1/ai/proxy/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Internal-Api-Key": key,
            },
            body: JSON.stringify({
              messages: [{ role: "user", content: "Say hi in one word." }],
              llm,
              max_tokens: 16,
              structure: true,
            }),
          });
          const body = await r.json();
          const ms = Math.round(performance.now() - t0);
          const m = body.metrics || { latency_ms: ms, rating: "ok" };
          recordMetric({
            time: new Date().toLocaleTimeString(),
            mode: "bench",
            llm,
            ms: Math.round(m.latency_ms ?? ms),
            outTok: m.completion_tokens,
            tps: m.tokens_per_second,
            rating: m.rating || (r.ok ? "ok" : "very_slow"),
          });
          addMessage(
            "assistant",
            llm + ": " + (r.ok ? (body.content || "ok") : JSON.stringify(body.detail || body)),
            (m.latency_ms ?? ms) + " ms · " + (m.rating || "—")
          );
        } catch (e) {
          addMessage("error", llm + " bench: " + e.message);
        }
      }
      sendBtn.disabled = false;
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    document.getElementById("settingsBtn").addEventListener("click", () => {
      settingsEl.classList.toggle("open");
    });
    apiKeyEl.addEventListener("change", () => {
      localStorage.setItem(STORAGE_KEY, apiKeyEl.value.trim());
    });
    document.getElementById("benchBtn").addEventListener("click", benchmark);
    document.getElementById("clearMetricsBtn").addEventListener("click", () => {
      metricsLog = [];
      saveMetrics();
    });
    document.getElementById("collapseMetrics").addEventListener("click", () => {
      metricsPanel.classList.add("collapsed");
      syncMetricsToggle();
    });
    document.getElementById("openMetrics").addEventListener("click", () => {
      metricsPanel.classList.remove("collapsed");
      syncMetricsToggle();
    });

    loadUiConfig().then(() => {
      refreshHealth();
      renderMetricsTable();
      updateStatusBar();
      syncMetricsToggle();
    });
    setInterval(refreshHealth, 30000);
  </script>
</body>
</html>
