spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT}
spring.datasource.hikari.maximum-pool-size=${DB_MAXIMUM_POOL_SIZE}
spring.datasource.hikari.minimum-idle=${DB_MINIMUM_IDLE}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME}

spring.flyway.enabled=${DB_FLYWAY_ENABLED}
spring.flyway.baseline-on-migrate=${DB_FLYWAY_BASELINE_ON_MIGRATE}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI}

server.undertow.accesslog.enabled=${UNDERTOW_ACCESSLOG_ENABLED}
server.undertow.accesslog.pattern=${UNDERTOW_ACCESSLOG_PATTERN}
server.undertow.threads.io=${UNDERTOW_IO_THREADS}
server.undertow.threads.worker=${UNDERTOW_WORKER_THREADS}
server.undertow.max-http-post-size=${UNDERTOW_MAX_HTTP_POST_SIZE}

logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY}

# WebRTC / STUN / TURN
app.webrtc.stun-urls=${WEBRTC_STUN_URLS:stun:localhost:3478}
app.webrtc.turn-urls=${WEBRTC_TURN_URLS:turn:localhost:3478}
app.webrtc.turn-username=${WEBRTC_TURN_USERNAME:testuser}
app.webrtc.turn-credential=${WEBRTC_TURN_CREDENTIAL:StrongPassword123!}
app.webrtc.turn-secret=${WEBRTC_TURN_SECRET:}

# Room Media Profiles
app.room.media.social.audio-enabled=${ROOM_SOCIAL_AUDIO_ENABLED:true}
app.room.media.social.video-enabled=${ROOM_SOCIAL_VIDEO_ENABLED:true}
app.room.media.social.chat-enabled=${ROOM_SOCIAL_CHAT_ENABLED:true}
app.room.media.social.mic-enabled=${ROOM_SOCIAL_MIC_ENABLED:false}
app.room.media.social.video-resolution=${ROOM_SOCIAL_VIDEO_RESOLUTION:480p}
app.room.media.social.default-members=${ROOM_SOCIAL_DEFAULT_MEMBERS:10}
app.room.media.social.user-limit=${ROOM_SOCIAL_USER_LIMIT:3}

app.room.media.team.audio-enabled=${ROOM_TEAM_AUDIO_ENABLED:true}
app.room.media.team.video-enabled=${ROOM_TEAM_VIDEO_ENABLED:true}
app.room.media.team.chat-enabled=${ROOM_TEAM_CHAT_ENABLED:true}
app.room.media.team.mic-enabled=${ROOM_TEAM_MIC_ENABLED:true}
app.room.media.team.video-resolution=${ROOM_TEAM_VIDEO_RESOLUTION:720p}
app.room.media.team.default-max-members=${ROOM_TEAM_DEFAULT_MAX_MEMBERS:6}
app.room.media.team.default-minimum-members=${ROOM_TEAM_DEFAULT_MIN_MEMBERS:4}

# AI Service
app.ai.service-url=${AI_SERVICE_URL}
app.ai.service.timeout=${AI_SERVICE_TIMEOUT:5000}

# Payment / PayOS
app.payment.payos.client-id=${PAYOS_CLIENT_ID}
app.payment.payos.api-key=${PAYOS_API_KEY}
app.payment.payos.checksum-key=${PAYOS_CHECKSUM_KEY}
app.payment.return-url=${PAYOS_RETURN_URL}
app.payment.cancel-url=${PAYOS_CANCEL_URL}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# Same origins for STOMP handshake (defaults to localhost only without this → chat/WebRTC broken on prod)
app.websocket.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== Email Service Client Settings =====
app.email-service.base-url=${EMAIL_SERVICE_BASE_URL:http://localhost:8895}
app.email-service.internal-api-key=${EMAIL_SERVICE_INTERNAL_API_KEY:dev-internal-email-key}
app.frontend.public-base-url=${FRONTEND_PUBLIC_BASE_URL:http://localhost:5173}