spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=workflow
spring.datasource.username=postgres
spring.datasource.password=123456

spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.undertow.accesslog.enabled=false
server.undertow.accesslog.pattern=%h %l %u %t "%r" %s %b
server.undertow.threads.io=4
server.undertow.threads.worker=32
server.undertow.max-http-post-size=10485760

logging.level.org.springframework.security=INFO

app.internal.api-key=dev-internal-workflow-key