spring.datasource.url=${DB_AUTH_URL}
spring.datasource.username=${DB_AUTH_USERNAME}
spring.datasource.password=${DB_AUTH_PASSWORD}

auth.issuer-uri=${AUTH_ISSUER_URI}

spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT}
spring.datasource.hikari.maximum-pool-size=${DB_MAXIMUM_POOL_SIZE}
spring.datasource.hikari.minimum-idle=${DB_MINIMUM_IDLE}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME}

spring.flyway.enabled=${DB_FLYWAY_ENABLED}
spring.flyway.baseline-on-migrate=${DB_FLYWAY_BASELINE_ON_MIGRATE}

app.email-service.base-url=${EMAIL_SERVICE_BASE_URL}
app.email-service.internal-api-key=${EMAIL_SERVICE_INTERNAL_API_KEY}
app.frontend.public-base-url=${APP_FRONTEND_PUBLIC_BASE_URL}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.jwt.expiration=${JWT_EXPIRATION}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

ai.provider=${AI_PROVIDER}
ai.model=${AI_MODEL}
ai.api-key=${AI_API_KEY}
ai.base-url=${AI_BASE_URL}
ai.enabled=${AI_ENABLED}

logging.level.org.springframework.security=WARN

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OAuth2 Client
app.oauth2.client-secret=${OAUTH2_CLIENT_SECRET:{noop}secret}
app.oauth2.redirect-uris=${OAUTH2_REDIRECT_URIS:http://localhost:5173/callback,http://localhost:5173}