spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=auth
spring.datasource.username=postgres
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=validate

auth.issuer-uri=http://192.168.1.31:8880
app.cors.allowed-origins=http://localhost:5173,http://192.168.1.31:5173
app.oauth2.redirect-uris=http://localhost:5173/callback,http://localhost:5173,http://192.168.1.31:5173/callback,http://192.168.1.31:5173
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

app.email-service.base-url=http://localhost:8895
app.email-service.internal-api-key=dev-internal-email-key
app.frontend.public-base-url=http://192.168.1.31:5173

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-here}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.jwt.expiration=3600
spring.jwt.refresh-token-expiration=604800

ai.provider=gemini
ai.model=gemini-2.0-flash
ai.api-key=${GEMINI_API_KEY:gemini-api-key-here}
ai.base-url=https://generativelanguage.googleapis.com
ai.enabled=true

logging.level.org.springframework.security=INFO